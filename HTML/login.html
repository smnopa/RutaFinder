<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>login</title>
    <link rel="shortcut icon" href="../IMG/logo.png" />
    <link rel="stylesheet" href="../CSS/login.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300&family=Rubik:ital,wght@0,300..900;1,300..900&display=swap" rel="stylesheet">
    <script src="https://kit.fontawesome.com/d4a4db1d66.js" crossorigin="anonymous"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/twitter-bootstrap/4.6.0/js/bootstrap.min.js"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.css"
/>
</head>
<body>
    <header>
        <nav>
            <a href="../HTML/main.html"><i class="fa-solid fa-arrow-left"></i></a>
            <div class="logo"><img src="../img/logo.png"></div>
        </nav>
    </header>
    <main>
    <div class="col1">
        <div class="swiper">
            <div class="swiper-wrapper">
                <div class="swiper-slide"><img src="../img/Cartagena.jpg" alt="Imagen 1"></div>
                <div class="swiper-slide"><img src="../img/cocora.jpg" alt="Imagen 2"></div>
                <div class="swiper-slide"><img src="../img/rio.jpg" alt="Imagen 3"></div>
                <div class="swiper-slide"><img src="../img/playa.jpg" alt="Imagen 4"></div>
            </div>
        </div>
    </div>

    <div class="col2">
        <h1>Regístrate o inicia sesión</h1>
        <div class="button" id="google">
            <img src="../IMG/google.png" alt="Google Logo">
            Continuar con Google
        </div>
        <div class="button" id="facebook">
            <img src="../IMG/facebook.png" alt="Facebook Logo">
            Continuar con Facebook
        </div>
        <div class="button" id="celular">
            <img src="../IMG/celu.png" alt="Celular Logo">
            Continuar con tu celular
        </div>   
        </div>
    </div>
</main>
<script src="https://cdn.jsdelivr.net/npm/swiper@11/swiper-bundle.min.js"></script>
<script src="../JS/login.js" ></script>
