<head>

    <link rel="shortcut icon" href="../IMG/logo.png" />

    <header>

            <h1>Regístrate o inicia sesion</h1>

            <div class="face">
                <a href="https://es-la.facebook.com/login/device-based/regular/login/?login_attempt=1">Continuar con Facebook</a>

            <div class="celular">

            <img src="../img/rio.jpg" alt="Imagen 3" class="img">
